all:
  children:
    # Local execution context used for operator-side tasks that should not SSH back into the host.
    local:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: /usr/bin/python3
    # Physical hosts that will run KVM/libvirt and later host the Kubernetes VMs.
    hypervisors:
      hosts:
        # This host name matches the SSH alias documented in the handoff notes.
        homelab-ubuntu:
          ansible_host: 192.168.1.100
          ansible_user: ipolishchuk
          ansible_ssh_private_key_file: "~/.ssh/id_ed25519_homelab-ubuntu"
          ansible_ssh_common_args: "-o IdentitiesOnly=yes"
          # Pin the remote interpreter so Ansible does not guess incorrectly.
          ansible_python_interpreter: /usr/bin/python3
    # Kubernetes guests created by the OpenTofu libvirt stack.
    kubernetes:
      children:
        control_plane:
          hosts:
            control-plane:
              ansible_host: 192.168.122.10
        workers:
          hosts:
            worker-1:
              ansible_host: 192.168.122.11
            worker-2:
              ansible_host: 192.168.122.12
      vars:
        # Guest access uses the shared VM account documented in the handoff notes.
        ansible_user: homelab
        # Use the dedicated VM key directly so automation does not depend on an SSH agent.
        ansible_ssh_private_key_file: "~/.ssh/id_ed25519_homelab-vm"
        # Reuse the remote Python path explicitly so future roles do not depend on interpreter discovery.
        ansible_python_interpreter: /usr/bin/python3
        # Keep SSH strict; the dedicated VM key can be supplied via ssh-agent, SSH config, or a higher-precedence var.
        ansible_ssh_common_args: "-o IdentitiesOnly=yes"
