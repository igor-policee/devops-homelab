---
# Kubernetes minor version used for both the apt repository URL and package installation.
# Kubernetes packages are installed from pkgs.k8s.io/core:/stable:/v1.35/deb/.
kubernetes_minor_version: v1.35

# Install the validated Cilium chart version from the host-side operator shell.
cilium_chart_version: 1.19.3

# Gateway API CRD version installed before Cilium to enable Gateway API support.
gateway_api_version: v1.2.0

# Operator host kubectl and Helm tool configuration.
kubernetes_operator_kubeconfig_path: "{{ lookup('env', 'HOME') }}/.kube/config"
helm_cli_version: v3.20.2
