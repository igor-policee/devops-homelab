---
- name: Prepare Kubernetes guests
  hosts: kubernetes
  become: true
  roles:
    # Apply the guest baseline that was validated during the manual bootstrap.
    - role: kubernetes_guest_prep

- name: Install Kubernetes bootstrap packages
  hosts: kubernetes
  become: true
  roles:
    # Reproduce the validated GitLab fallback package flow on every node.
    - role: kubernetes_packages

- name: Initialize Kubernetes control plane
  hosts: control_plane
  become: true
  roles:
    # Run kubeadm init once and export the resulting admin.conf to the operator host.
    - role: kubeadm_control_plane

- name: Join Kubernetes workers
  hosts: workers
  become: true
  roles:
    # Reuse the join command generated by the control-plane role.
    - role: kubeadm_worker_join

- name: Install Cilium from the operator host
  hosts: hypervisors
  become: false
  roles:
    # Install the validated Cilium chart version using the host-side kubeconfig.
    - role: cilium_install
