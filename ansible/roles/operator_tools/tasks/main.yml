---
# Require the same GitLab token used for node bootstrap so operator kubectl can come from the validated fallback source.
- name: Assert GitLab token is provided for operator tools
  ansible.builtin.assert:
    that:
      - lookup('ansible.builtin.env', 'GITLAB_TOKEN') | length > 0
    fail_msg: >-
      Export GITLAB_TOKEN on the Ansible control node before installing operator tooling.

# Install the small helper packages needed to fetch and unpack local operator binaries.
- name: Install operator tool prerequisites
  ansible.builtin.apt:
    name: "{{ operator_tools_packages }}"
    state: present
    update_cache: true
  become: true

# Keep locally downloaded artifacts out of the repository tree.
- name: Ensure operator tools download directory exists
  ansible.builtin.file:
    path: "{{ operator_tools_download_dir }}"
    state: directory
    mode: "0755"

# Reuse the validated GitLab-hosted kubectl artifact instead of depending on direct upstream package delivery.
- name: Download operator kubectl package
  ansible.builtin.get_url:
    url: >-
      {{ kubernetes_gitlab_api }}/projects/{{ kubernetes_gitlab_project_id }}/packages/generic/{{
      kubernetes_gitlab_package_name }}/{{ kubernetes_gitlab_package_version }}/{{ kubernetes_operator_kubectl_artifact }}
    dest: "{{ operator_tools_download_dir }}/{{ kubernetes_operator_kubectl_artifact }}"
    mode: "0644"
    headers:
      PRIVATE-TOKEN: "{{ lookup('ansible.builtin.env', 'GITLAB_TOKEN') }}"
  no_log: true

# Keep the operator host kubectl version aligned with the cluster bootstrap version.
- name: Install kubectl on the operator host from the validated package
  ansible.builtin.apt:
    deb: "{{ operator_tools_download_dir }}/{{ kubernetes_operator_kubectl_artifact }}"
    state: present
  become: true

# Freeze kubectl on the operator host so local administration stays aligned with the current cluster phase.
- name: Hold kubectl on the operator host
  ansible.builtin.dpkg_selections:
    name: kubectl
    selection: hold
  become: true

# Detect the current Helm version so the role only replaces it when needed.
- name: Check current Helm version
  ansible.builtin.shell: "helm version --template '{% raw %}{{ .Version }}{% endraw %}'"
  register: operator_tools_helm_version
  changed_when: false
  failed_when: false

# Use the architecture-specific Helm release naming expected by get.helm.sh.
- name: Derive Helm release architecture
  ansible.builtin.set_fact:
    operator_tools_helm_arch: >-
      {{
        operator_tools_helm_arch_map.get(
          ansible_facts["architecture"],
          ansible_facts["architecture"]
        )
      }}

# Download Helm only when it is missing or at the wrong validated version.
- name: Download Helm release archive
  ansible.builtin.get_url:
    url: "https://get.helm.sh/helm-{{ helm_cli_version }}-linux-{{ operator_tools_helm_arch }}.tar.gz"
    dest: "{{ operator_tools_download_dir }}/helm-{{ helm_cli_version }}-linux-{{ operator_tools_helm_arch }}.tar.gz"
    mode: "0644"
  when: operator_tools_helm_version.stdout | trim != helm_cli_version

# Extract the Helm binary in a temporary directory before copying it into place.
- name: Unpack Helm release archive
  ansible.builtin.unarchive:
    src: "{{ operator_tools_download_dir }}/helm-{{ helm_cli_version }}-linux-{{ operator_tools_helm_arch }}.tar.gz"
    dest: "{{ operator_tools_download_dir }}"
    remote_src: true
  when: operator_tools_helm_version.stdout | trim != helm_cli_version

# Install the validated Helm binary into the standard local operator path.
- name: Install Helm binary on the operator host
  ansible.builtin.copy:
    src: "{{ operator_tools_download_dir }}/linux-{{ operator_tools_helm_arch }}/helm"
    dest: /usr/local/bin/helm
    mode: "0755"
    owner: root
    group: root
    remote_src: true
  become: true
  when: operator_tools_helm_version.stdout | trim != helm_cli_version
