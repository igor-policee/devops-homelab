---
- name: Install operator tool prerequisites
  ansible.builtin.apt:
    name: "{{ operator_tools_packages }}"
    state: present
    update_cache: true
  become: true

# Mirror the same Kubernetes apt source used on the nodes so operator kubectl stays aligned.
- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Download Kubernetes apt signing key
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_minor_version }}/deb/Release.key"
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: "0644"
  become: true

- name: Add Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/{{ kubernetes_minor_version }}/deb/ /"
    state: present
    filename: kubernetes
    update_cache: true
  become: true

- name: Install kubectl on the operator host
  ansible.builtin.apt:
    name: kubectl
    state: present
  become: true

- name: Hold kubectl on the operator host
  ansible.builtin.dpkg_selections:
    name: kubectl
    selection: hold
  become: true

# Detect the current Helm version so the role only replaces it when needed.
- name: Check current Helm version
  ansible.builtin.shell: "helm version --template '{% raw %}{{ .Version }}{% endraw %}'"
  register: operator_tools_helm_version
  changed_when: false
  failed_when: false

- name: Derive Helm release architecture
  ansible.builtin.set_fact:
    operator_tools_helm_arch: >-
      {{
        operator_tools_helm_arch_map.get(
          ansible_facts["architecture"],
          ansible_facts["architecture"]
        )
      }}

# Download Helm only when it is missing or at the wrong validated version.
- name: Ensure operator tools download directory exists
  ansible.builtin.file:
    path: "{{ operator_tools_download_dir }}"
    state: directory
    mode: "0755"

- name: Download Helm release archive
  ansible.builtin.get_url:
    url: "https://get.helm.sh/helm-{{ helm_cli_version }}-linux-{{ operator_tools_helm_arch }}.tar.gz"
    dest: "{{ operator_tools_download_dir }}/helm-{{ helm_cli_version }}-linux-{{ operator_tools_helm_arch }}.tar.gz"
    mode: "0644"
  when: operator_tools_helm_version.stdout | trim != helm_cli_version

- name: Unpack Helm release archive
  ansible.builtin.unarchive:
    src: "{{ operator_tools_download_dir }}/helm-{{ helm_cli_version }}-linux-{{ operator_tools_helm_arch }}.tar.gz"
    dest: "{{ operator_tools_download_dir }}"
    remote_src: true
  when: operator_tools_helm_version.stdout | trim != helm_cli_version

- name: Install Helm binary on the operator host
  ansible.builtin.copy:
    src: "{{ operator_tools_download_dir }}/linux-{{ operator_tools_helm_arch }}/helm"
    dest: /usr/local/bin/helm
    mode: "0755"
    owner: root
    group: root
    remote_src: true
  become: true
  when: operator_tools_helm_version.stdout | trim != helm_cli_version
