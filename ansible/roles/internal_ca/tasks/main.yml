---
# All tasks run on the Ansible controller (homelab-ubuntu).
# The CA private key is generated here and never copied to any VM.

- name: Ensure CA directory exists
  ansible.builtin.file:
    path: "{{ internal_ca_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Ensure CA certs directory exists
  ansible.builtin.file:
    path: "{{ internal_ca_cert_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

# Generate once; subsequent runs detect the existing key and skip.
- name: Generate CA private key
  community.crypto.openssl_privatekey:
    path: "{{ internal_ca_key_path }}"
    size: 4096
    type: RSA
    owner: root
    group: root
    mode: "0400"

- name: Generate CA certificate signing request
  community.crypto.openssl_csr:
    path: "{{ internal_ca_dir }}/ca.csr"
    privatekey_path: "{{ internal_ca_key_path }}"
    common_name: "{{ internal_ca_common_name }}"
    use_common_name_for_san: false
    basic_constraints:
      - "CA:TRUE"
    basic_constraints_critical: true
    key_usage:
      - keyCertSign
      - cRLSign
    key_usage_critical: true

- name: Generate self-signed CA certificate
  community.crypto.x509_certificate:
    path: "{{ internal_ca_cert_path }}"
    privatekey_path: "{{ internal_ca_key_path }}"
    csr_path: "{{ internal_ca_dir }}/ca.csr"
    provider: selfsigned
    selfsigned_not_after: "+{{ internal_ca_valid_days }}d"
    owner: root
    group: root
    mode: "0644"

# Install the CA cert on the Ansible controller itself so curl, kubectl, and
# other tools running on homelab-ubuntu trust homelab.internal services.
- name: Install homelab CA cert on the controller host
  ansible.builtin.copy:
    src: "{{ internal_ca_cert_path }}"
    dest: /usr/local/share/ca-certificates/homelab-ca.crt
    mode: "0644"
    remote_src: true
  notify: update ca certificates

- name: Flush handlers to apply CA trust immediately
  ansible.builtin.meta: flush_handlers

# Per-service certificate generation — iterates over internal_ca_services list.
- name: Generate service private key
  community.crypto.openssl_privatekey:
    path: "{{ internal_ca_cert_dir }}/{{ item.name }}.key"
    size: 2048
    type: RSA
    owner: root
    group: root
    mode: "0400"
  loop: "{{ internal_ca_services }}"

- name: Generate service certificate signing request
  community.crypto.openssl_csr:
    path: "{{ internal_ca_cert_dir }}/{{ item.name }}.csr"
    privatekey_path: "{{ internal_ca_cert_dir }}/{{ item.name }}.key"
    common_name: "{{ item.domain }}"
    subject_alt_names:
      - "DNS:{{ item.domain }}"
  loop: "{{ internal_ca_services }}"

- name: Sign service certificate with homelab CA
  community.crypto.x509_certificate:
    path: "{{ internal_ca_cert_dir }}/{{ item.name }}.crt"
    csr_path: "{{ internal_ca_cert_dir }}/{{ item.name }}.csr"
    ownca_path: "{{ internal_ca_cert_path }}"
    ownca_privatekey_path: "{{ internal_ca_key_path }}"
    provider: ownca
    ownca_not_after: "+{{ internal_ca_service_valid_days }}d"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ internal_ca_services }}"
