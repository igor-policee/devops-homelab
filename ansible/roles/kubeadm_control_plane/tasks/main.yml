---
# Skip kubeadm init on reruns once the control-plane admin config already exists.
- name: Check whether the control plane is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_admin_conf

# Detect worker-side kubelet state that would block a clean kubeadm init retry.
- name: Check whether kubelet client config already exists
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubeadm_kubelet_conf

# Detect leftover static Pod manifests from a partial kubeadm init attempt.
- name: Check whether kubeadm manifests directory exists
  ansible.builtin.stat:
    path: /etc/kubernetes/manifests
  register: kubeadm_manifests_dir

# Treat leftover kubelet config or manifests as partial bootstrap state from a failed init.
- name: Derive whether the control plane has partial kubeadm state
  ansible.builtin.set_fact:
    kubeadm_partial_state_detected: >-
      {{
        (not kubeadm_admin_conf.stat.exists) and (
          kubeadm_kubelet_conf.stat.exists or
          kubeadm_manifests_dir.stat.exists
        )
      }}

# Recover automatically from interrupted kubeadm init attempts on fresh automation targets.
- name: Reset partial kubeadm state before retrying init
  ansible.builtin.command:
    argv:
      - kubeadm
      - reset
      - -f
  when:
    - kubeadm_partial_state_detected
    - kubeadm_control_plane_auto_reset_partial_state

# Refresh kubelet after kubeadm reset so preflight checks see a clean baseline.
- name: Restart kubelet after resetting partial kubeadm state
  ansible.builtin.systemd_service:
    name: kubelet
    state: restarted
  when:
    - kubeadm_partial_state_detected
    - kubeadm_control_plane_auto_reset_partial_state

# Fail with a clear message when partial state is detected but auto-reset is disabled.
- name: Assert that no unrecovered kubeadm partial state remains
  ansible.builtin.assert:
    that:
      - not kubeadm_partial_state_detected or kubeadm_control_plane_auto_reset_partial_state
    fail_msg: >-
      Partial kubeadm state was detected on the control-plane node while /etc/kubernetes/admin.conf
      is still absent. Re-enable automatic reset or run 'kubeadm reset -f' manually before retrying.

# Keep kubeadm in control of the first clean kubelet start on a fresh or reset node.
- name: Stop kubelet before kubeadm init when control plane is not initialized
  ansible.builtin.systemd_service:
    name: kubelet
    state: stopped
  when: not kubeadm_admin_conf.stat.exists

# Reproduce the validated kubeadm init arguments from the manual bootstrap.
- name: Initialize Kubernetes control plane
  ansible.builtin.command:
    argv:
      - kubeadm
      - init
      - "--apiserver-advertise-address={{ kubernetes_control_plane_advertise_address }}"
      - "--pod-network-cidr={{ kubernetes_pod_network_cidr }}"
  when: not kubeadm_admin_conf.stat.exists

# Always refresh the join command so worker re-joins can be recovered without a manual SSH step.
- name: Generate worker join command
  ansible.builtin.command: kubeadm token create --print-join-command
  register: kubeadm_join_command
  changed_when: false
  no_log: true

- name: Publish worker join command for later plays
  ansible.builtin.set_fact:
    kubernetes_join_command: "{{ kubeadm_join_command.stdout }}"
  no_log: true

# Keep host-side kubectl administration aligned with the validated operator workflow.
- name: Ensure operator kubeconfig directory exists
  ansible.builtin.file:
    path: "{{ kubernetes_operator_kubeconfig_path | dirname }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Read control-plane admin.conf
  ansible.builtin.slurp:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_admin_conf_contents

- name: Write operator kubeconfig on the control node
  ansible.builtin.copy:
    dest: "{{ kubernetes_operator_kubeconfig_path }}"
    content: "{{ kubeadm_admin_conf_contents.content | b64decode }}"
    mode: "0600"
  delegate_to: localhost
  become: false
