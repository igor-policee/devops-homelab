---
# Core packages required for KVM, libvirt management, and VM provisioning tools.
kvm_libvirt_packages:
  - cpu-checker
  - qemu-kvm
  - qemu-utils
  - libvirt-daemon-system
  - libvirt-clients
  - virtinst
  - bridge-utils

# Ubuntu 24.04 uses libvirtd for the system-wide libvirt daemon.
kvm_libvirt_services:
  - libvirtd

# Manage the host-wide libvirt daemon explicitly rather than relying on virsh defaults.
kvm_libvirt_uri: qemu:///system

# Default NAT network settings for libvirt guests on a WiFi-backed host.
kvm_libvirt_network_name: default
kvm_libvirt_network_bridge: virbr0
kvm_libvirt_network_address: 192.168.122.1
kvm_libvirt_network_netmask: 255.255.255.0
kvm_libvirt_network_dhcp_start: 192.168.122.2
kvm_libvirt_network_dhcp_end: 192.168.122.254

# Default storage pool used by OpenTofu for VM disks and cloud-init images.
kvm_libvirt_storage_pool_name: default
kvm_libvirt_storage_pool_path: /var/lib/libvirt/images

# Reuse the SSH user by default so virsh can be validated for the normal operator account.
kvm_libvirt_host_user: "{{ ansible_user | default('ipolishchuk') }}"

# DNS host entries added to the libvirt network so all VMs resolve homelab.internal names
# via the dnsmasq instance that libvirt already runs on the host (192.168.122.1).
kvm_libvirt_dns_hosts:
  - ip: 192.168.122.10
    hostnames:
      - control-plane
      - control-plane.homelab.internal
  - ip: 192.168.122.11
    hostnames:
      - worker-1
      - worker-1.homelab.internal
  - ip: 192.168.122.12
    hostnames:
      - worker-2
      - worker-2.homelab.internal
  - ip: 192.168.122.20
    hostnames:
      - gitlab-vm
      - gitlab.homelab.internal
