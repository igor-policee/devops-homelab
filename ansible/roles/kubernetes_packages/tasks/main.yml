---
- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

# Download the signing key for the Kubernetes apt repository.
- name: Download Kubernetes apt signing key
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_minor_version }}/deb/Release.key"
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: "0644"

- name: Add Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/{{ kubernetes_minor_version }}/deb/ /"
    state: present
    filename: kubernetes
    update_cache: true

- name: Install Kubernetes packages
  ansible.builtin.apt:
    name:
      - kubeadm
      - kubelet
      - kubectl
    state: present

# Freeze the validated package set so automation passes do not drift silently.
- name: Hold Kubernetes packages at the installed version
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ kubernetes_held_packages }}"

# Distinguish fresh nodes from already bootstrapped nodes before touching kubelet state.
- name: Check whether kubelet bootstrap config already exists
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubernetes_kubelet_conf

# Keep kubelet installed and enabled, but let kubeadm own the first clean start on fresh nodes.
- name: Ensure kubelet service is enabled but stopped before kubeadm bootstrap
  ansible.builtin.systemd_service:
    name: kubelet
    enabled: true
    state: stopped
  when: not kubernetes_kubelet_conf.stat.exists
