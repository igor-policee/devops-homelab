# Use the repository-local inventory and roles so commands can be run from this repo.
[defaults]
inventory = inventory/hosts.yml
roles_path = roles
interpreter_python = auto_silent
host_key_checking = true
retry_files_enabled = false

# Configure privilege escalation for host bootstrap tasks that need root access.
[privilege_escalation]
become = true
become_method = sudo
become_ask_pass = false
